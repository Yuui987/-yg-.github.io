<!DOCTYPE html><html lang="zh-HK"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議論文準備：近朱者赤，近墨者黑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .dark body { background-color: #111827; }
        .thought-bubble {
            position: relative;
            background: #e0f2fe;
            border-radius: .4em;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px dashed #38bdf8;
        }
        .dark .thought-bubble { background: #1e3a5f; border-color: #2563eb; color: #cbd5e1; }
        .thought-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 20px solid transparent;
            border-top-color: #e0f2fe;
            border-bottom: 0;
            border-left: 0;
            margin-left: -10px;
            margin-bottom: -20px;
        }
        .dark .thought-bubble:after { border-top-color: #1e3a5f; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Star rating */
        .star-rating { display: inline-flex; gap: 4px; }
        .star-rating .star {
            font-size: 1.6rem;
            cursor: pointer;
            color: #d1d5db;
            transition: color 0.15s, transform 0.15s;
        }
        .star-rating .star:hover { transform: scale(1.2); }
        .star-rating .star.active { color: #f59e0b; }
        .dark .star-rating .star { color: #4b5563; }
        .dark .star-rating .star.active { color: #f59e0b; }

        /* Checkbox styling */
        .technique-cb { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
        .technique-cb:hover { background: #f0f9ff; }
        .dark .technique-cb:hover { background: #1e293b; }
        .technique-cb input[type="checkbox"] { width: 18px; height: 18px; accent-color: #2563eb; cursor: pointer; }
        .technique-cb span { font-size: 0.95rem; }

        /* Toast notification */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: #1e293b; color: #fff; padding: 12px 28px; border-radius: 12px;
            font-size: 0.95rem; z-index: 999; opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .dark .toast { background: #f1f5f9; color: #0f172a; }

        /* Dark mode overrides */
        .dark .bg-white { background-color: #1e293b !important; }
        .dark .bg-yellow-50 { background-color: #1a1c2e !important; }
        .dark .text-gray-800 { color: #e2e8f0 !important; }
        .dark .text-gray-700 { color: #cbd5e1 !important; }
        .dark .text-gray-600 { color: #94a3b8 !important; }
        .dark .text-gray-500 { color: #94a3b8 !important; }
        .dark .text-gray-400 { color: #64748b !important; }
        .dark .text-gray-300 { color: #475569 !important; }
        .dark .border-gray-200 { border-color: #334155 !important; }
        .dark .bg-gray-100 { background-color: #334155 !important; }
        .dark .text-gray-600 { color: #94a3b8 !important; }
        .dark .bg-gray-50 { background-color: #1e293b !important; }
        .dark .hover\:bg-gray-50:hover { background-color: #334155 !important; }
        .dark .bg-blue-50 { background-color: #1e3a5f !important; }
        .dark .border-blue-500 { border-color: #3b82f6 !important; }
        .dark .bg-green-100 { background-color: #064e3b !important; }
        .dark .text-green-700 { color: #6ee7b7 !important; }
        .dark .bg-gray-200 { background-color: #334155 !important; }

        .option-label-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 4px;
        }

        /* Right panel section card */
        .eval-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .dark .eval-card { background: #0f172a; border-color: #334155; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">

        <!-- 左側：轉譯工作區 -->
        <div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-blue-500">
            <h1 class="text-2xl font-bold text-gray-800 mb-2"><i class="fas fa-language text-blue-500"></i> 思想轉譯器</h1>
            <p class="text-gray-600 mb-6 text-sm">題目：你同意「近朱者赤，近墨者黑」嗎？<br>任務：討論兩例的優劣處，選出你更欣賞的文例，並嘗試與組員分享原因。</p>

            <div id="step-container">
                <!-- 內容由 JS 動態生成 -->
            </div>

            <div class="mt-6 flex justify-between">
                <button id="prev-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hidden hover:bg-gray-300 transition">上一步</button>
                <button id="next-btn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">下一步 <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <!-- 右側：評價工作區 -->
        <div class="bg-yellow-50 rounded-xl shadow-lg p-6 border-t-4 border-yellow-400 relative">
            <div class="absolute top-4 right-4 text-yellow-600 opacity-50"><i class="fas fa-clipboard-check fa-3x"></i></div>
            <h2 class="text-xl font-bold text-gray-800 mb-1"><i class="fas fa-search text-yellow-600"></i> 評價工作區</h2>
            <p class="text-gray-500 text-sm mb-5">閱讀左方兩個選項後，完成以下評價。</p>

            <div id="eval-panel">
                <!-- 由 JS 動態生成 -->
            </div>
        </div>

    </div>

    <script>
        // ── Dark mode detection ──
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });

        // ── Toast helper (replaces alert) ──
        function showToast(msg, duration) {
            duration = duration || 2500;
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, duration);
        }

        // ── Data ──
        const steps = [
            {
                title: "評價：引言",
                thought: "💡 錦囊：引言應該交代立場和提供預覽。想想兩項示例有什麼做得好和不好的地方？",
                options: [
                    { id: "intro_1", label: "基本論述", text: "我同意「近朱者赤，近墨者黑」這句話，因為環境對我們的影響很大。接近好人使人變好，接近壞人使人變壞。" },
                    { id: "intro_2", label: "進階論述（推薦）", text: "古語有云：「近朱者赤，近墨者黑。」這句流傳千古的俗語，深刻地道出了環境薰陶對個人成長的深刻影響。對此，我十分認同，並將從「近朱」和「近墨」兩方面論證外在環境對人的影響。" }
                ]
            },
            {
                title: "評價：正文論點",
                thought: "🧠 模擬立場：同意這句話。",
                options: [
                    { id: "arg1_1", label: "論述例子一", text: "我支持「近朱者赤，近墨者黑」，因為環境對人的影響很大。首先，荀子說過，「蓬生麻中，不扶而直；白沙在涅，與之俱黑。」其次，一個人的品格就像一張潔白的紙。當它長時間接觸到紅色的顏料，便會逐漸染上紅色；若它靠近黑色的墨水，則會沾染上黑色。我們身邊的朋友和環境，就像是那些顏料和墨水。這說明了人會被身邊的人同化，所以我們要小心選擇朋友，避免被染黑。我們在不知不覺間，就會受到他們的影響，最終形成我們的品格。如果他們有很多壞習慣，我們最終也會跟著他們同流合污。綜上所述，我認為這句話很正確。" },
                    { id: "arg1_2", label: "論述例子二", text: "古語有云：「近朱者赤，近墨者黑。」這句話點出了環境薰陶如何影響人身心發展的深刻道理。荀子曾言：「蓬生麻中，不扶而直；白沙在涅，與之俱黑。」好的環境像麻稈一樣，讓原來細弱、雜亂的蓬草也能挺直生長；壞的環境像黑泥，即使不特意染色，裏面混入的白砂也會變黑。人的品性也和蓬草、白砂一樣。古時孟母三遷，孟母重視兒子的教育環境，從墓地、市集搬到學堂旁，最終把孟子培養成一代大儒。優質環境為孟子日後的經學造詣埋下種子——試想若孟母沒有堅持她的理念、未曾搬離墓地附近，未來她的孩子會學喪葬之事多呢，還是讀學堂的書、成為一代大儒的機會多呢？由上可知，客觀環境對個人成長的影響不容小覷。" }
                ]
            },
            {
                title: "評價：駁論",
                thought: "🧠 模擬立場：部分同意這句話。",
                options: [
                    { id: "refute_1", label: "論述例子三", text: "我認為「近朱者赤，近墨者黑」這句話有其道理，因為身邊的人確實會影響我們。但這並不是絕對的。我們可以把一個人的心智想像成一個篩子。這個篩子雖然可能會讓一些沙子和泥土掉下去，但它同時也可以把一些不好的東西篩掉，只留下好的沙子。所以，我們不是完全被動地接受所有影響，而是可以選擇過濾掉壞的，只學習好的，因為我們有自己的想法和判斷力。" },
                    { id: "refute_2", label: "論述例子四", text: "我部分認同「近朱者赤，近墨者黑」這句古訓，它精闢地指出外在環境對個體潛移默化的影響。然而，如果我們將其奉為圭臬、視它為一種必然的宿命論，便未免低估了人類心靈的強大力量。每個人的意志像一座擁有堅固核心的堡壘，其中蘊含著獨特的價值觀、判斷力與道德準繩，這便是我們抵禦外在侵蝕的防禦系統。周遭的「朱」與「墨」，固然會如潮水般拍打著堡壘的外牆，試圖滲透、沖刷，甚至滲入內部。然而，只要堡壘的核心不曾動搖，其防禦系統便會去蕪存菁，甚至反彈外來的負面影響。所以，真正決定我們最終色彩的，由內心的選擇所控。一個意志堅定、內省自覺的人，即使身處「墨」海，亦能出淤泥而不染。正如孔子曰：「為仁由己，而由人乎哉？」一個人的品德修養與行為準則，最終源於自身的選擇與努力，而非全然受外在環境所擺佈。" }
                ]
            }
        ];

        const TECHNIQUES = ["舉例論證", "比喻論證", "對比論證", "引用論證"];

        let currentStep = 0;

        // Per-step, per-option evaluation data
        // evalData[stepIndex][optionIndex] = { techniques: Set, stars: 0 }
        const evalData = steps.map(function(step) {
            return step.options.map(function() {
                return { techniques: new Set(), stars: 0 };
            });
        });

        const stepContainer = document.getElementById('step-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const evalPanel = document.getElementById('eval-panel');

        // ── Render left panel ──
        function renderStep() {
            const step = steps[currentStep];
            let html = '<div class="fade-in">';
            html += '<h2 class="text-lg font-bold text-blue-700 mb-4">\u{1F4CD} ' + step.title + '</h2>';
            html += '<div class="thought-bubble text-gray-700 font-medium">' + step.thought + '</div>';
            html += '<p class="text-sm text-gray-500 mb-3"><i class="fas fa-book-reader"></i> 請細心閱讀以下兩個文例：</p>';
            html += '<div class="space-y-3">';

            step.options.forEach(function(opt) {
                var tagClass = opt.label.includes('推薦') ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600';
                html += '<div class="block p-4 border rounded-lg bg-white border-gray-200">';
                html += '<span class="option-label-tag ' + tagClass + '">' + opt.label + '</span>';
                html += '<p class="text-gray-800 mt-1 leading-relaxed">' + opt.text + '</p>';
                html += '</div>';
            });

            html += '</div></div>';
            stepContainer.innerHTML = html;

            prevBtn.style.display = currentStep === 0 ? 'none' : 'block';
            nextBtn.innerHTML = currentStep === steps.length - 1 ? '完成 <i class="fas fa-check"></i>' : '下一步 <i class="fas fa-arrow-right"></i>';

            renderEvalPanel();
        }

        // ── Render right panel ──
        function renderEvalPanel() {
            var step = steps[currentStep];
            var html = '<div class="fade-in">';

            // Section 1: Argumentation techniques
            html += '<div class="mb-5">';
            html += '<h3 class="text-base font-bold text-gray-800 mb-3">\u{1F50D} 判斷文例所用論證手法，然後勾選對應選擇</h3>';

            step.options.forEach(function(opt, oi) {
                var data = evalData[currentStep][oi];
                html += '<div class="eval-card">';
                html += '<p class="text-sm font-semibold text-gray-700 mb-2"><i class="fas fa-file-alt text-blue-400"></i> ' + opt.label + '</p>';
                html += '<div class="grid grid-cols-2 gap-1">';
                TECHNIQUES.forEach(function(tech) {
                    var checked = data.techniques.has(tech) ? 'checked' : '';
                    html += '<label class="technique-cb">';
                    html += '<input type="checkbox" ' + checked + ' onchange="toggleTechnique(' + currentStep + ',' + oi + ',\'' + tech + '\',this.checked)">';
                    html += '<span class="text-gray-700">' + tech + '</span>';
                    html += '</label>';
                });
                html += '</div></div>';
            });

            html += '</div>';

            // Section 2: Star rating
            html += '<div>';
            html += '<h3 class="text-base font-bold text-gray-800 mb-1">\u2B50 選出你更欣賞的例子</h3>';
            html += '<p class="text-xs text-gray-500 mb-3">並試著向同學分享原因。（⭐ 最低分 · ⭐⭐⭐ 最高分）</p>';

            step.options.forEach(function(opt, oi) {
                var data = evalData[currentStep][oi];
                html += '<div class="eval-card flex items-center justify-between">';
                html += '<p class="text-sm font-semibold text-gray-700"><i class="fas fa-pen-nib text-yellow-500"></i> ' + opt.label + '</p>';
                html += '<div class="star-rating">';
                for (var s = 1; s <= 3; s++) {
                    var activeClass = s <= data.stars ? 'active' : '';
                    html += '<span class="star ' + activeClass + '" onclick="setStars(' + currentStep + ',' + oi + ',' + s + ')">&#9733;</span>';
                }
                html += '</div></div>';
            });

            html += '</div></div>';
            evalPanel.innerHTML = html;
        }

        // ── Interaction handlers ──
        window.toggleTechnique = function(stepIdx, optIdx, tech, isChecked) {
            if (isChecked) {
                evalData[stepIdx][optIdx].techniques.add(tech);
            } else {
                evalData[stepIdx][optIdx].techniques.delete(tech);
            }
        };

        window.setStars = function(stepIdx, optIdx, count) {
            // Toggle off if clicking same value
            if (evalData[stepIdx][optIdx].stars === count) {
                evalData[stepIdx][optIdx].stars = 0;
            } else {
                evalData[stepIdx][optIdx].stars = count;
            }
            renderEvalPanel();
        };

        // ── Navigation ──
        nextBtn.addEventListener('click', function() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                renderStep();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showToast('✅ 所有評價已完成！你可以和其他同學分享你的看法。', 3000);
            }
        });

        prevBtn.addEventListener('click', function() {
            if (currentStep > 0) {
                currentStep--;
                renderStep();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        // ── Init ──
        renderStep();
    </script>



</body></html>
